name: testplot

# Render reference phase diagrams and post them on the PR so reviewers
# can eyeball them. The "correctness" of a landau plot is hard to
# formalise in a unit test, so we trigger this on demand by adding the
# `testplot` label to a PR.
#
# The rendered PNGs are inlined into the PR comment as base64 data URIs
# so we don't need to commit them anywhere or keep them as artifacts.

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  render:
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'testplot') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'testplot'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .[fast-tsp]

      - name: Render phase diagrams
        run: python tests/integration/testplots.py --out _testplots

      - name: Post comment with images
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = '_testplots';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.png')).sort();
            const short = process.env.HEAD_SHA.slice(0, 7);
            const lines = [
              `### Test plots for \`${short}\``,
              '',
              `Rendered by \`tests/integration/testplots.py\`.`,
              '',
            ];
            for (const f of files) {
              const data = fs.readFileSync(path.join(dir, f)).toString('base64');
              const name = f.replace(/\.png$/, '');
              lines.push(`#### ${name}`);
              lines.push('');
              lines.push(`<img alt="${name}" src="data:image/png;base64,${data}" width="600">`);
              lines.push('');
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n'),
            });
