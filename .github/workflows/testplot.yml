name: testplot

# Render reference phase diagrams and post them on the PR so reviewers
# can eyeball them. The "correctness" of a landau plot is hard to
# formalise in a unit test, so we trigger this on demand by adding the
# `testplot` label to a PR.
#
# The rendered PNGs are committed to an orphan `testplots` branch under
# a per-commit directory and then linked from a PR comment via
# raw.githubusercontent.com so images render inline.

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  render:
    if: >-
      (github.event.action == 'labeled' && github.event.label.name == 'testplot') ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'testplot'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: src

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/pyproject.toml

      - name: Install
        working-directory: src
        run: pip install -e .[fast-tsp]

      - name: Render phase diagrams
        working-directory: src
        run: python tests/integration/testplots.py --out "${GITHUB_WORKSPACE}/_testplots"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: testplots-${{ github.event.pull_request.head.sha }}
          path: _testplots/*.png
          if-no-files-found: error

      - name: Checkout testplots branch
        uses: actions/checkout@v5
        with:
          ref: testplots
          path: gallery
        continue-on-error: true

      - name: Initialise testplots branch if missing
        run: |
          if [ ! -d gallery/.git ]; then
            rm -rf gallery
            git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gallery
            cd gallery
            git checkout --orphan testplots
            git rm -rf . >/dev/null 2>&1 || true
            echo "# Test plot gallery" > README.md
            git add README.md
            git -c user.email="actions@github.com" -c user.name="github-actions[bot]" commit -m "init testplots branch"
            git push origin testplots
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit plots to testplots branch
        id: commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          cd gallery
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          DEST="pr-${PR}/${SHA}"
          mkdir -p "$DEST"
          cp "${GITHUB_WORKSPACE}"/_testplots/*.png "$DEST"/
          git add "$DEST"
          git commit -m "testplots for PR #${PR} @ ${SHA}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" testplots
          echo "dest=$DEST" >> "$GITHUB_OUTPUT"

      - name: Post comment with images
        uses: actions/github-script@v7
        env:
          DEST: ${{ steps.commit.outputs.dest }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const fs = require('fs');
            const dest = process.env.DEST;
            const sha = process.env.HEAD_SHA;
            const short = sha.slice(0, 7);
            const files = fs.readdirSync('_testplots').filter(f => f.endsWith('.png')).sort();
            const base = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/testplots/${dest}`;
            const lines = [
              `### Test plots for \`${short}\``,
              '',
              `Rendered by \`tests/integration/testplots.py\`. Sources committed to the \`testplots\` branch under \`${dest}\`.`,
              '',
            ];
            for (const f of files) {
              const name = f.replace(/\.png$/, '');
              lines.push(`#### ${name}`);
              lines.push('');
              lines.push(`<img alt="${name}" src="${base}/${f}" width="600">`);
              lines.push('');
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n'),
            });
