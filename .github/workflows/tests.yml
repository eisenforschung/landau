name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: ["ubuntu-latest"]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Setup
      shell: bash -l {0}
      run: |
        pip install -e .[test,constraints,fast-tsp,python-tsp]
    - name: run tests
      shell: bash -l {0}
      env:
        HYPOTHESIS_ARTIFACT_NAME: hypothesis-example-db-py${{ matrix.python-version }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        pytest
    - name: Upload Hypothesis example database
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: hypothesis-example-db-py${{ matrix.python-version }}
        path: .hypothesis/examples
        if-no-files-found: ignore
        retention-days: 90
