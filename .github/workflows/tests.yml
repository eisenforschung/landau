name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run:
              - 'landau/**'
              - 'tests/**'
              - 'pyproject.toml'
              - '.github/workflows/**'

  build:
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: ["ubuntu-latest"]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Skip notice
      if: needs.changes.outputs.run != 'true'
      run: echo "No source, test, or workflow changes; skipping."
    - uses: actions/checkout@v5
      if: needs.changes.outputs.run == 'true'
    - name: Set up Python ${{ matrix.python-version }}
      if: needs.changes.outputs.run == 'true'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
    - name: Setup
      if: needs.changes.outputs.run == 'true'
      shell: bash -l {0}
      run: |
        pip install -e .[test,constraints,fast-tsp,python-tsp]
    - name: run tests
      if: needs.changes.outputs.run == 'true'
      shell: bash -l {0}
      env:
        HYPOTHESIS_ARTIFACT_NAME: hypothesis-example-db-py${{ matrix.python-version }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        pytest
    - name: Upload Hypothesis example database
      if: needs.changes.outputs.run == 'true' && always()
      uses: actions/upload-artifact@v4
      with:
        name: hypothesis-example-db-py${{ matrix.python-version }}
        path: .hypothesis/examples
        if-no-files-found: ignore
        retention-days: 90
